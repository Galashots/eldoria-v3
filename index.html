<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover + user-scalable=no keeps the game full-bleed and stops
         double-tap zoom from fighting your touch controls on iPad Safari. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Realm of Eldoria</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #1a1410; overflow: hidden; }
      /* Phaser injects its canvas here; Scale.FIT centres and letterboxes it. */
      #game { width: 100vw; height: 100vh; touch-action: none; }
      canvas { image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
